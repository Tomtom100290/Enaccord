spring.application.name=app
# Nom de ton application
spring.application.name=EnAccord

#### Connexion MySQL (avec création automatique de la BDD si elle n'existe pas)
spring.datasource.url=jdbc:mysql://localhost:3306/le_juste_accord?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

#### Hibernate : On met "update" pour ne pas perdre les données ŕ chaque redémarrage !
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect