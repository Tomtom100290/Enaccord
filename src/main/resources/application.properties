spring.application.name=EnAccord

# Si vous lancez l'application depuis votre IDE, laissez localhost.
# Docker mappe le port 3306 du conteneur sur votre machine physique.
spring.datasource.url=jdbc:mysql://localhost:3306/le_juste_accord?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
server.forward-headers-strategy=native
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.enaccord.app=DEBUG
server.error.include-stacktrace=always
server.error.whitelabel.enabled=false
