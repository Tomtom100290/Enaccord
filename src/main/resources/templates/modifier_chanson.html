<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Modifier la chanson - En Accord</title>
    <style>
        body { font-family: sans-serif; background-color: #f8fafc; padding: 40px; color: #1e293b; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"] { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }

        /* Styles de l'éditeur interactif */
        .lyrics-line { margin-top: 25px; margin-bottom: 10px; font-family: monospace; font-size: 1.1rem; white-space: pre; }
        .clickable-char { position: relative; cursor: pointer; padding: 0 1px; display: inline-block; }
        .clickable-char:hover { background-color: #eedffc; }
        .clickable-char[data-chord]::before {
            content: attr(data-chord);
            position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%);
            background-color: #7c3aed; color: white; font-size: 0.8rem; font-weight: bold;
            padding: 2px 6px; border-radius: 4px; white-space: nowrap; z-index: 10;
        }
        .chord-selector { margin-bottom: 15px; }
        .chord-selector input[type="radio"] { display: none; }
        .chord-selector label { display: inline-block; padding: 8px 16px; background: #e2e8f0; border-radius: 6px; cursor: pointer; font-weight: bold; margin-right: 5px; }
        .chord-selector input[type="radio"]:checked + label { background: #7c3aed; color: white; }
        .btn { background: #7c3aed; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; text-decoration: none; }
        .btn-cancel { background: #64748b; margin-left: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Modifier la chanson</h2>

    <form th:action="@{/chansons/{id}/modifier(id=${chanson.id})}"
          th:object="${chanson}"
          method="POST"
          onsubmit="preparerEnvoi(event)">

        <div class="form-group">
            <label for="titre">Titre :</label>
            <input type="text" id="titre" th:field="*{titre}" required>
        </div>

        <div class="form-group">
            <label for="artiste">Artiste / Groupe :</label>
            <input type="text" id="artiste" th:field="*{artiste}" required>
        </div>

        <div class="form-group">
            <label>Éditeur d'accords interactif :</label>
            <div class="chord-selector">
                <input type="radio" id="chord-C" name="activeChord" value="C" checked>
                <label for="chord-C">C</label>
                <input type="radio" id="chord-G" name="activeChord" value="G">
                <label for="chord-G">G</label>
                <input type="radio" id="chord-Am" name="activeChord" value="Am">
                <label for="chord-Am">Am</label>
                <input type="radio" id="chord-F" name="activeChord" value="F">
                <label for="chord-F">F</label>
            </div>
        </div>

        <div id="interactiveWorkspace" style="border: 1px solid #e2e8f0; padding: 20px; border-radius: 8px; margin-bottom: 20px; background: #fdfdfd;"></div>

        <div id="rawChordPro" style="display: none;" th:text="*{contenuChordPro}"></div>
        <input type="hidden" id="finalChordProInput" th:field="*{contenuChordPro}">

        <button type="submit" class="btn">Enregistrer les modifications</button>
        <a th:href="@{/chansons/{id}(id=${chanson.id})}" class="btn btn-cancel">Annuler</a>
    </form>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const rawText = document.getElementById('rawChordPro').textContent;
        const workspace = document.getElementById('interactiveWorkspace');

        const lines = rawText.split('\n');

        lines.forEach(line => {
            const lineDiv = document.createElement('div');
            lineDiv.className = 'lyrics-line';

            if (line.trim() === '') {
                lineDiv.innerHTML = '&nbsp;';
            } else {
                // Découpe le format ChordPro pour générer les spans
                const parts = line.split(/(\[.*?\])/g);
                let currentChord = null;

                parts.forEach(part => {
                    if (part.startsWith('[') && part.endsWith(']')) {
                        currentChord = part.slice(1, -1);
                    } else {
                        for (let i = 0; i < part.length; i++) {
                            const charSpan = document.createElement('span');
                            charSpan.className = 'clickable-char';
                            charSpan.textContent = part[i];

                            // Si on a un accord en attente, on l'applique sur la première lettre de ce morceau de texte
                            if (i === 0 && currentChord) {
                                charSpan.setAttribute('data-chord', currentChord);
                                currentChord = null;
                            }

                            charSpan.addEventListener('click', function() {
                                const accordSelectionne = document.querySelector('input[name="activeChord"]:checked').value;
                                if (this.getAttribute('data-chord') === accordSelectionne) {
                                    this.removeAttribute('data-chord');
                                } else {
                                    this.setAttribute('data-chord', accordSelectionne);
                                }
                            });
                            lineDiv.appendChild(charSpan);
                        }
                    }
                });
            }
            workspace.appendChild(lineDiv);
        });
    });

    // Compile à nouveau au format ChordPro avant d'envoyer
    function preparerEnvoi(event) {
        let chordProResultat = [];
        const lignesVisuelles = document.querySelectorAll('.lyrics-line');

        lignesVisuelles.forEach(lineDiv => {
            let ligneConstruite = "";
            const caracteres = lineDiv.querySelectorAll('.clickable-char');

            if (caracteres.length === 0) {
                chordProResultat.push("");
                return;
            }

            caracteres.forEach(charSpan => {
                if (charSpan.hasAttribute('data-chord')) {
                    const accord = charSpan.getAttribute('data-chord');
                    ligneConstruite += `[${accord}]`;
                }
                ligneConstruite += charSpan.textContent;
            });
            chordProResultat.push(ligneConstruite);
        });

        document.getElementById('finalChordProInput').value = chordProResultat.join('\n');
    }
</script>
</body>
</html>
