<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion - Le Juste Accord</title>
    <!-- Intégration des polices et icônes du projet -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">

    <style>
        /* Déclaration locale des variables graphiques du projet pour autonomie complète */
        :root {
            --cream: #f4f1ea;
            --mustard: #e9e2d0;
            --mustard-deep: #d1c4a3;
            --ink: #2b241a;
            --ink-soft: #4a3f31;
            --slate: #7a7062;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--cream);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: var(--ink);
        }

        .card-auth {
            background: white;
            padding: 40px 32px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(43, 36, 26, 0.06);
            width: 100%;
            max-width: 380px;
            box-sizing: border-box;
            border: 1px solid rgba(43, 36, 26, 0.04);
        }

        .brand-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--slate);
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 12px;
            gap: 8px;
        }

        .brand-logo {
            width: 350px;
            height: auto;
            object-fit: contain;
        }

        h2 {
            color: var(--ink);
            margin-top: 0;
            margin-bottom: 24px;
            text-align: center;
            font-family: 'Fraunces', serif;
            font-size: 2.2rem;
        }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--ink-soft);
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--slate);
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 0.95rem;
            transition: border-color 0.15s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--mustard-deep);
        }

        .btn-submit {
            width: 100%;
            background: var(--ink);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            font-family: inherit;
            transition: background-color 0.15s ease;
            margin-top: 8px;
        }

        .btn-submit:hover {
            background: var(--ink-soft);
        }

        .alert {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .error {
            background: #fee2e2;
            color: #ef4444;
            border: 1px solid #fca5a5;
        }

        .success {
            background: #dcfce7;
            color: #15803d;
            border: 1px solid #86efac;
        }

        .link-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.9rem;
            color: var(--slate);
        }

        .link-footer a {
            color: var(--ink);
            font-weight: 600;
            text-decoration: none;
            border-bottom: 1px solid var(--mustard-deep);
        }

        .link-footer a:hover {
            color: var(--ink-soft);
            border-bottom-color: var(--ink);
        }
    </style>
</head>
<body>

<div class="card-auth">
    <!-- En-tête avec logo centré au-dessus du titre H2 -->
    <a class="brand-container" th:href="@{/}">
        <img class="brand-logo" th:src="@{/images/logoEnAccord.png}" alt="Logo En Accord">
    </a>

    <h2>Connexion</h2>

    <!-- Alertes de statut -->
    <div th:if="${param.error}" class="alert error">
        <i class="fa-solid fa-triangle-exclamation"></i> Email ou mot de passe incorrect.
    </div>
    <div th:if="${param.success}" class="alert success">
        <i class="fa-solid fa-circle-check"></i> Inscription réussie ! Connectez-vous.
    </div>
    <div th:if="${param.logout}" class="alert success">
        <i class="fa-solid fa-circle-info"></i> Vous avez été déconnecté.
    </div>

    <!-- Formulaire Spring Security -->
    <form th:action="@{/connexion}" method="POST">
        <div class="form-group">
            <label for="email">Email :</label>
            <input type="email" id="email" name="email" required autocomplete="username">
        </div>
        <div class="form-group">
            <label for="password">Mot de passe :</label>
            <input type="password" id="password" name="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-submit">Se connecter</button>
    </form>

    <p class="link-footer">
        Pas encore de compte ? <a th:href="@{/inscription}">Inscrivez-vous</a>
    </p>
</div>

</body>
</html>
