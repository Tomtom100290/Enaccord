<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion - Le Juste Accord</title>
    <style>
        body { font-family: sans-serif; background: #f8fafc; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); width: 350px; }
        h2 { color: #7c3aed; margin-top: 0; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        .btn { width: 100%; background: #7c3aed; color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .alert { padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 0.9rem; }
        .error { background: #fee2e2; color: #ef4444; }
        .success { background: #dcfce7; color: #15803d; }
    </style>
</head>
<body>
<div class="card">
    <h2>Connexion</h2>

    <div th:if="${param.error}" class="alert error">Email ou mot de passe incorrect.</div>
    <div th:if="${param.success}" class="alert success">Inscription réussie ! Connectez-vous.</div>
    <div th:if="${param.logout}" class="alert success">Vous avez été déconnecté.</div>

    <form th:action="@{/connexion}" method="POST">
        <div class="form-group">
            <label>Email :</label>
            <input type="email" name="email" required>
        </div>
        <div class="form-group">
            <label>Mot de passe :</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit" class="btn">Se connecter</button>
    </form>
    <p style="text-align: center; margin-top: 15px; font-size: 0.9rem;">
        Pas encore de compte ? <a th:href="@{/inscription}" style="color: #7c3aed;">Inscrivez-vous</a>
    </p>
</div>
</body>
</html>
