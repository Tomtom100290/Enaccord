name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: enaccord_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Facultatif mais recommandé si le wrapper pose encore problème
      - name: Droits d'exécution sur mvnw
        run: chmod +x mvnw

      - name: Build, Tests et Analyse SonarCloud
        env:
          # Variables pour MySQL (communes aux tests)
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/enaccord_test
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root
          # Variables pour SonarCloud
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        # Une seule commande propre qui fait TOUT
        run: ./mvnw -B clean verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=tomtom100290 -Dsonar.organization=tomtom100290