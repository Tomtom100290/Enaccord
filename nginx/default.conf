server {
    listen 80;
    server_name localhost;

    location / {
        proxy_pass http://enaccord-app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port 8085;
        proxy_redirect off;

        # CSP complète autorisant jsDelivr, les polices Google, et les images Unsplash
        add_header Content-Security-Policy "default-src 'self' http://localhost:8085 https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://cdnjs.cloudflare.com https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data: https://images.unsplash.com;";
    }
}